name: Spatial Scout 24/7
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the CSV back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-genai playwright playwright-stealth python-telegram-bot
          playwright install chromium --with-deps

      - name: Run Spatial Scout
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scout.py

      - name: Commit and Push CSV changes
        run: |
          git config --global user.name "Spatial Scout Bot"
          git config --global user.email "bot@spatialscout.com"
          git add found_jobs.csv || echo "No CSV yet"
          git commit -m "Update job log [skip ci]" || echo "No changes to commit"
          git push